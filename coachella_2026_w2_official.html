var rid='',me='',mbrs=[],cks={},cv='sched',cd='Friday',activeStage='',tlDay='Friday',mapDay='Friday';
function sk(){return 'coa26w2h_'+rid;}
async function sv(){try{await window.storage.set(sk(),JSON.stringify({m:mbrs,c:cks}),true);}catch(e){}}
async function ld(){try{var r=await window.storage.get(sk(),true);if(r&&r.value){var d=JSON.parse(r.value);mbrs=d.m||[];cks=d.c||{};}}catch(e){}}
function gmc(n){var m=mbrs.find(function(x){return x.n===n;});return m?C[m.i%C.length]:C[0];}
function kk(d,a){return d+'||'+a;}
function gc(d,a){return cks[kk(d,a)]||[];}

function genRid(){var ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';for(var i=0;i<4;i++)r+=ch[Math.floor(Math.random()*ch.length)];return r;}

function applyRoom(r){rid=r;document.getElementById('rCode').textContent=rid;localStorage.setItem('coa26w2_room',rid);document.getElementById('roomSetupRow').style.display='none';document.getElementById('changeRoomBtn').style.display='inline-block';var jr=document.getElementById('jr');jr.style.display='flex';}

async function doSetRoom(){var inp=document.getElementById('roomIn').value.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');var r=inp||genRid();applyRoom(r);await ld();rAll();if(me){document.getElementById('jr').style.display='none';poll();}}

function parseRange(str){
  var pts=str.split('\u2013');if(pts.length<2)return{s:960,e:1020};
  function tm(t){var m=t.trim().match(/(\d+):(\d+)/);if(!m)return 0;var h=parseInt(m[1]),mi=parseInt(m[2]);if(h<12)h+=12;return h*60+mi;}
  var s=tm(pts[0]),e=tm(pts[1]);if(e<=s)e+=1440;return{s:s,e:e};
}

function buildMenu(){var menu=document.getElementById('stageMenu');menu.innerHTML='';var all=document.createElement('div');all.className='stage-opt'+(activeStage===''?' on':'');all.innerHTML='<div class="stage-opt-dot" style="background:#888"></div>All Stages<span class="stage-opt-check">✓</span>';all.addEventListener('click',function(){setStage('');});menu.appendChild(all);STAGES.forEach(function(s){var opt=document.createElement('div');opt.className='stage-opt'+(activeStage===s?' on':'');opt.innerHTML='<div class="stage-opt-dot" style="background:'+(SC[s]||'#888')+'"></div>'+s+'<span class="stage-opt-check">✓</span>';opt.addEventListener('click',function(){setStage(s);});menu.appendChild(opt);});}

function rSched(){
  var el=document.getElementById('view-sched');el.innerHTML='';
  var filtered=LN[cd].filter(function(a){return activeStage===''||a.s===activeStage;});
  if(!filtered.length){el.innerHTML='<div style="padding:28px 20px;text-align:center;font-size:14px;color:#AAA">No artists.</div>';return;}
  var st={},ord=[];filtered.forEach(function(a){if(!st[a.s]){st[a.s]=[];ord.push(a.s);}st[a.s].push(a);});
  ord.forEach(function(stage){
    var sl=document.createElement('div');sl.className='stage-label';sl.innerHTML='<div class="stage-dot" style="background:'+(SC[stage]||'#1A1208')+'"></div><div class="stage-name-lbl">'+stage+'</div>';el.appendChild(sl);
    st[stage].forEach(function(a){
      var hl=HEADLINERS.indexOf(a.a)>=0;var ns=gc(cd,a.a);var isMeOn=(me&&ns.indexOf(me)>=0);
      var card=document.createElement('div');card.className='acard'+(hl?' hl':'')+(isMeOn?' checked-me':'');
      var avs=mbrs.length?mbrs.map(function(m){var on=ns.indexOf(m.n)>=0;var c=C[m.i%C.length];return'<div class="ck'+(on?' on':'')+'"'+(on?' style="background:'+c.bg+';border-color:'+c.bg+';color:'+c.fg+'"':'')+'>'+m.n[0].toUpperCase()+'</div>';}).join(''):'';
      var cnt=ns.length?(ns.length+'/'+mbrs.length):'';
      card.innerHTML='<div class="acard-left"><div class="acard-time">'+a.t+'</div><div class="acard-name">'+a.a+'</div></div><div class="acard-checks">'+avs+'</div><div class="acard-cnt">'+cnt+'</div><div class="plus-icon">'+(isMeOn?'✓':'+')+'</div>';
      (function(dy,ar){card.addEventListener('click',function(){tog(dy,ar);});})(cd,a.a);el.appendChild(card);
    });
  });
}

function tlFmt(m){var h=Math.floor(m/60)%24;var mi=m%60;var ap=h>=12?'PM':'AM';var hh=h>12?h-12:(h===0?12:h);return hh+':'+(mi<10?'0':'')+mi+' '+ap;}
function setTlDay(el,day){document.querySelectorAll('.tl-day-tab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');tlDay=day;rTimeline();}

function rTimeline(){
  var cont=document.getElementById('tlCont');cont.innerHTML='';
  var dd=LN[tlDay];
  var stages=STAGES.filter(function(s){return dd.some(function(a){return a.s===s;});});
  var allR=dd.map(function(a){return parseRange(a.t);});
  var minT=Math.floor(Math.min.apply(null,allR.map(function(r){return r.s;}))/60)*60;
  var rawMaxT=Math.max.apply(null,allR.map(function(r){return r.e;}));
  var maxT=Math.ceil(Math.min(rawMaxT,1500)/60)*60;
  var gW=Math.round((maxT-minT)*PPM);
  var myList=me?dd.filter(function(a){return gc(tlDay,a.a).indexOf(me)>=0;}).map(function(a){var r=parseRange(a.t);return{a:a.a,s:r.s,e:r.e};}):[]; 
  function hasConflict(a){var r=parseRange(a.t);return myList.some(function(p){return p.a!==a.a&&r.s<p.e&&r.e>p.s;});}

  var sCol=document.createElement('div');sCol.className='tl-stage-col';
  var sHdr=document.createElement('div');sHdr.className='tl-stage-hdr-cell';sHdr.textContent='STAGE';sCol.appendChild(sHdr);

  grid.appendChild(thdr);
  var rCont=document.createElement('div');rCont.className='tl-rows';rCont.style.cssText='width:'+gW+'px;height:'+(stages.length*RH)+'px;position:relative';
  for(var tt2=minT;tt2<=maxT;tt2+=60){var vl=document.createElement('div');vl.className='tl-vline hr';vl.style.cssText='position:absolute;top:0;bottom:0;left:'+Math.round((tt2-minT)*PPM)+'px';rCont.appendChild(vl);}
  for(var tt3=minT+30;tt3<maxT;tt3+=60){var vl2=document.createElement('div');vl2.className='tl-vline';vl2.style.cssText='position:absolute;top:0;bottom:0;left:'+Math.round((tt3-minT)*PPM)+'px';rCont.appendChild(vl2);}
  if(SUNSET>=minT&&SUNSET<=maxT){var sl=document.createElement('div');sl.className='tl-sunset';sl.style.cssText='position:absolute;top:0;bottom:0;left:'+Math.round((SUNSET-minT)*PPM)+'px';var slbl=document.createElement('div');slbl.className='tl-sunset-lbl';slbl.textContent='Sunset 7:12 PM';sl.appendChild(slbl);rCont.appendChild(sl);}
  stages.forEach(function(s,si){var bg=document.createElement('div');bg.className='tl-row-bg';bg.style.cssText='position:absolute;left:0;right:0;top:'+(si*RH)+'px;height:'+RH+'px';rCont.appendChild(bg);});

  stages.forEach(function(s,si){
    dd.filter(function(a){return a.s===s;}).forEach(function(a){
      var r=parseRange(a.t);var ns=gc(tlDay,a.a);var isMeOn=(me&&ns.indexOf(me)>=0);var isConf=isMeOn&&hasConflict(a);var hasCrew=ns.length>0;
      var clampedE=Math.min(r.e,maxT);
      var left=Math.round((r.s-minT)*PPM);var w=Math.max(Math.round((clampedE-r.s)*PPM)-2,16);
      var block=document.createElement('div');block.className='tl-block'+(isMeOn?' me-on':'')+(isConf?' clash':'');

      rCont.appendChild(block);
    });
  });
  grid.appendChild(rCont);cont.appendChild(grid);
}

function setMapDay(el,day){document.querySelectorAll('.map-day-tab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');mapDay=day;}
function rMapPins(){}

function rSum(){var el=document.getElementById('sc');if(!mbrs.length){el.innerHTML='<span style="font-size:13px;color:#AAA;font-weight:500">Join to start planning</span>';return;}el.innerHTML=mbrs.map(function(m){var c=C[m.i%C.length];return'<div class="si"><div class="sdot" style="background:'+c.bg+'"></div><span>'+m.n+'</span></div>';}).join('');}

function rAll(){rMbar();if(cv==='sched')rSched();else if(cv==='timeline')rTimeline();rSum();}

function sw(el,view,day){
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');cv=view;if(day)cd=day;
  document.getElementById('filterWrap').style.display=(view==='sched')?'block':'none';
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});document.getElementById('view-'+view).classList.add('on');
  if(view==='sched')rSched();else if(view==='timeline')rTimeline();
}
function doShare(){var tx='Coachella 2026 W2 — Room: '+rid;if(navigator.clipboard){navigator.clipboard.writeText(tx).then(function(){toast('Copied! Room: '+rid);}).catch(function(){toast('Room: '+rid);});}else toast('Room: '+rid);}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2500);}
var pt=null;
function poll(){if(pt)clearInterval(pt);pt=setInterval(async function(){var pv=JSON.stringify({m:mbrs,c:cks});await ld();if(JSON.stringify({m:mbrs,c:cks})!==pv)rAll();},3000);}
(async function(){
  var savedRoom=localStorage.getItem('coa26w2_room');
  var savedName=localStorage.getItem('coa26w2_name');
  if(savedRoom){
    applyRoom(savedRoom);
    await ld();
    if(savedName&&mbrs.find(function(m){return m.n===savedName;})){me=savedName;document.getElementById('jr').style.display='none';rAll();toast('Welcome back, '+me+'!');poll();}
    else{rSched();rSum();}
  } else {
    rSched();rSum();
  }
})();
</script>
